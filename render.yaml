services:
  - type: web
    name: sork-cloud
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0

      # ── Database (Neon) ──────────────────────────────────────
      - key: DATABASE_URL
        sync: false

      # ── Auth (Clerk) ─────────────────────────────────────────
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_WEBHOOK_SECRET
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL
        value: /dashboard
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL
        value: /dashboard

      # ── AI (NVIDIA) ───────────────────────────────────────────
      - key: NVIDIA_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: AI_MODEL
        value: minimaxai/minimax-m2.7

      # ── Payments (Skydo) ──────────────────────────────────────
      - key: NEXT_PUBLIC_PAYMENT_LINK_PRO
        value: https://dashboard.skydo.com/pay/pyl_DvhKKI
      - key: NEXT_PUBLIC_PAYMENT_LINK_PRO_PLUS
        value: https://dashboard.skydo.com/pay/pyl_4Cfxc9
      - key: NEXT_PUBLIC_PAYMENT_LINK_PRO_ANNUAL
        sync: false
      - key: NEXT_PUBLIC_PAYMENT_LINK_PRO_PLUS_ANNUAL
        sync: false

      # ── Admin ─────────────────────────────────────────────────
      - key: ADMIN_USER_IDS
        sync: false

      # ── App URL (set to your Render URL after first deploy) ───
      - key: NEXT_PUBLIC_APP_URL
        sync: false

      # ── Beta mode ─────────────────────────────────────────────
      - key: NEXT_PUBLIC_BETA_FREE
        value: "false"

      # ── Stripe (dormant for now) ──────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
